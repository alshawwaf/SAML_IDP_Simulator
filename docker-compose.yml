# Dokploy-ready Compose — deploy straight from GitHub, no pasting.
#
# In Dokploy: create a "Compose" service, Provider = GitHub, pick this repo +
# branch, set the Compose Path to "docker-compose.yml", then in the Environment
# tab set IDP_DOMAIN (and any secrets), and Deploy. Turn on Autodeploy so a
# `git push` redeploys. Set the web domain via IDP_DOMAIN below — everything
# else has a safe default.
#
# (For a plain `docker compose up` outside Dokploy: drop the `labels:` block and
#  the external `dokploy-network`, and publish the web port, e.g. add
#  `- "5000:5000"` under `ports:`.)
services:
  saml-idp:
    build: .
    container_name: identity-access-simulator
    restart: unless-stopped
    environment:
      - IDP_PORT=5000
      - IDP_HOST=0.0.0.0
      - ENABLE_SSL=false
      # Set these in Dokploy's Environment tab (do NOT hardcode secrets here):
      #   IDP_DOMAIN=idp.yourlab.example   -> used by the Traefik labels below
      #   ADMIN_PASSWORD=...               (else the documented default CpDemo2026)
      #   SECRET_KEY=...                   (else auto-generated + persisted to the volume)
      #   RADIUS_SECRET / TACACS_SECRET    (else the demo default; also editable in-app)
    # RADIUS (UDP) and TACACS+ can't be HTTP-routed by Traefik, so publish them
    # on the host. Open these in the host firewall.
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "49:4949/tcp"
    # Web UI: routed by Dokploy's Traefik to the domain set in IDP_DOMAIN.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.idp.rule=Host(`${IDP_DOMAIN}`)"
      - "traefik.http.routers.idp.entrypoints=websecure"
      - "traefik.http.routers.idp.tls.certresolver=letsencrypt"
      - "traefik.http.services.idp.loadbalancer.server.port=5000"
    volumes:
      - saml_idp_data:/app/data       # keep these names to preserve existing data
      - saml_idp_certs:/app/app/certs
    networks:
      - dokploy-network

volumes:
  saml_idp_data:
  saml_idp_certs:

networks:
  dokploy-network:
    external: true
