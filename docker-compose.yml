services:
  saml-idp:
    build: .
    image: ghcr.io/alshawwaf/saml_idp_simulator:latest
    container_name: identity-access-simulator
    # Static defaults baked in here so a fresh deploy works out-of-the-box.
    # Override any of these via the Dokploy "Environment" tab.
    #
    # IMPORTANT: do NOT hardcode toggles like ENABLE_SCIM here. Listing a
    # value in this `environment:` block locks it in for the container in
    # some Dokploy versions and prevents the env tab from overriding.
    # Toggles that operators should be able to flip live only in the env tab.
    environment:
      - IDP_PORT=5000
      - IDP_HOST=0.0.0.0
      - ENABLE_SSL=false
      - FLASK_DEBUG=0
      - CERT_PATH=/app/app/certs/idp-cert.pem
      - KEY_PATH=/app/app/certs/idp-key.pem
      # SECRET_KEY intentionally NOT set here. Set it in the Dokploy Environment
      # tab to a unique random value (e.g. `openssl rand -base64 48`). If left
      # unset, the app generates one on first boot and persists it to the data
      # volume (/app/data/.secret-key) so it stays stable across redeploys.
      - ADMIN_USERNAME=admin@cpdemo.ca
      # ADMIN_PASSWORD intentionally NOT set here so the app uses its baked-in
      # default 'CpDemo2026' on first boot. The admin should change it from
      # Settings → Change Admin Password after first login (persisted to
      # /app/data/.admin-password-hash on the saml_idp_data volume). To lock
      # in a specific value at deploy time instead, add ADMIN_PASSWORD to the
      # Dokploy Environment tab.
      - IDP_ENTITY_ID=https://idp.cpdemo.ca
      - SSO_SERVICE_URL=https://idp.cpdemo.ca/sso
    # RADIUS (UDP) and TACACS+ can't be HTTP-routed by Traefik, so publish them
    # on the host directly. TACACS+ uses the standard host port 49 mapped to the
    # container's unprivileged 4949. Open these in the host firewall.
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "49:4949/tcp"
    volumes:
      - saml_idp_data:/app/data
      - saml_idp_certs:/app/app/certs
    networks:
      - dokploy-network
    restart: unless-stopped

volumes:
  saml_idp_data:
  saml_idp_certs:

networks:
  dokploy-network:
    external: true
