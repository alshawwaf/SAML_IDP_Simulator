{# Shared by the RADIUS + TACACS+ log pages: a click-to-open detail modal plus a
   5s auto-refresh that pauses while the modal is open (so it doesn't slam shut). #}
<div class="modal fade" id="logModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content glass border-0">
      <div class="modal-header border-0">
        <h5 class="modal-title text-white"><i class="bi bi-journal-text me-2"></i>Event detail
          <span id="lmResult" class="ms-2"></span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body pt-0">
        <table class="table table-dark table-sm align-middle mb-0"><tbody id="lmBody"></tbody></table>
      </div>
    </div>
  </div>
</div>
<script>
// Deferred to DOMContentLoaded: this partial renders inside the content block,
// which is parsed BEFORE Bootstrap's script tag — so wire up only once it loads.
function initLogModal() {
  var el = document.getElementById('logModal');
  if (!el) return;
  var body = document.getElementById('lmBody');
  var resultEl = document.getElementById('lmResult');
  var open = false;
  el.addEventListener('shown.bs.modal', function () { open = true; });
  el.addEventListener('hidden.bs.modal', function () { open = false; });

  function row(k, v) {
    var tr = document.createElement('tr');
    var th = document.createElement('th');
    th.className = 'text-muted small text-nowrap pe-3'; th.style.width = '36%'; th.textContent = k;
    var td = document.createElement('td');
    td.className = 'small text-white'; td.style.wordBreak = 'break-word'; td.textContent = v;
    tr.appendChild(th); tr.appendChild(td); return tr;
  }
  function section(label) {
    var tr = document.createElement('tr');
    var th = document.createElement('th');
    th.colSpan = 2; th.className = 'text-uppercase small text-muted pt-3 pb-1';
    th.style.letterSpacing = '.06em'; th.textContent = label;
    tr.appendChild(th); return tr;
  }
  function badge(result) {
    var ok = ['accept', 'start'].indexOf(result) >= 0, bad = ['reject', 'error'].indexOf(result) >= 0;
    return '<span class="badge bg-' + (ok ? 'success' : bad ? 'danger' : 'secondary') + '">' + result + '</span>';
  }

  document.querySelectorAll('.log-row').forEach(function (r) {
    r.addEventListener('click', function () {
      body.innerHTML = '';
      resultEl.innerHTML = badge(r.dataset.result || '');
      body.appendChild(section('Event'));
      body.appendChild(row('When', r.dataset.when || ''));
      body.appendChild(row('Protocol', (r.dataset.proto || '').toUpperCase()));
      body.appendChild(row('Exchange', r.dataset.kind || ''));
      body.appendChild(row('User', r.dataset.user || '—'));
      body.appendChild(row('NAS / source', r.dataset.nas || '—'));
      if (r.dataset.detail) body.appendChild(row('Summary', r.dataset.detail));
      var meta = {};
      try { meta = JSON.parse(r.dataset.meta || '{}'); } catch (e) {}
      var keys = Object.keys(meta);
      if (keys.length) {
        body.appendChild(section('Attributes'));
        keys.forEach(function (k) {
          var v = meta[k];
          if (Array.isArray(v)) v = v.join(', ');
          body.appendChild(row(k, (v === null || v === '') ? '—' : String(v)));
        });
      }
      bootstrap.Modal.getOrCreateInstance(el).show();
    });
  });

  // Auto-refresh, but never while a detail modal is open.
  setInterval(function () { if (!open) location.reload(); }, 5000);
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLogModal);
} else {
  initLogModal();
}
</script>
