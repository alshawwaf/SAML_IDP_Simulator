services:
  saml-idp:
    build: .
    image: ghcr.io/alshawwaf/saml_idp_simulator:latest
    container_name: saml-idp-simulator
    environment:
      - IDP_PORT=5000
      - IDP_HOST=0.0.0.0
      - ENABLE_SSL=false
      - FLASK_DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-Super-very-secret-key-cpdemo-2026}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin@cpdemo.ca}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Cpwins!1@2026}
      - CERT_PATH=/app/app/certs/idp-cert.pem
      - KEY_PATH=/app/app/certs/idp-key.pem
      - IDP_ENTITY_ID=https://idp.cpdemo.ca
      - SSO_SERVICE_URL=https://idp.cpdemo.ca/sso
      # SCIM 2.0 — set ENABLE_SCIM=true and that's it. On first boot the
      # simulator derives the token-encryption key from SECRET_KEY, auto-
      # generates a default inbound bearer token, logs it, and writes it to
      # /app/data/.scim-bootstrap-token for retrieval.
      - ENABLE_SCIM=${ENABLE_SCIM:-false}
      - SCIM_PUSH_ON_USER_CHANGE=${SCIM_PUSH_ON_USER_CHANGE:-false}
      # Optional: set explicitly to decouple SCIM tokens from SECRET_KEY rotation.
      - SCIM_ENCRYPTION_KEY=${SCIM_ENCRYPTION_KEY:-}
    volumes:
      - saml_idp_data:/app/data
      - saml_idp_certs:/app/app/certs
    networks:
      - dokploy-network
    restart: unless-stopped

volumes:
  saml_idp_data:
  saml_idp_certs:

networks:
  dokploy-network:
    external: true
