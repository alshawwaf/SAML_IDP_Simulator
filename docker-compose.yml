services:
  saml-idp:
    build: .
    image: ghcr.io/alshawwaf/saml_idp_simulator:latest
    container_name: saml-idp-simulator
    # Static defaults only. Per-deployment values (SECRET_KEY, ADMIN_PASSWORD,
    # ENABLE_SCIM, etc.) come from the Dokploy "Environment" tab and override
    # what's listed here at runtime.
    #
    # Note: do NOT use `${VAR:-default}` substitution syntax here — Dokploy's
    # env tab doesn't always populate docker-compose's variable substitution
    # context, which silently falls back to the default and surprises operators.
    environment:
      - IDP_PORT=5000
      - IDP_HOST=0.0.0.0
      - ENABLE_SSL=false
      - FLASK_DEBUG=0
      - CERT_PATH=/app/app/certs/idp-cert.pem
      - KEY_PATH=/app/app/certs/idp-key.pem
      # Sensible defaults for first-boot. Override via Dokploy Environment tab.
      - SECRET_KEY=Super-very-secret-key-cpdemo-2026
      - ADMIN_USERNAME=admin@cpdemo.ca
      - ADMIN_PASSWORD=Cpwins!1@2026
      - IDP_ENTITY_ID=https://idp.cpdemo.ca
      - SSO_SERVICE_URL=https://idp.cpdemo.ca/sso
      # SCIM 2.0 is off by default. Set ENABLE_SCIM=true in Dokploy to flip it on.
      - ENABLE_SCIM=false
      - SCIM_PUSH_ON_USER_CHANGE=false
    volumes:
      - saml_idp_data:/app/data
      - saml_idp_certs:/app/app/certs
    networks:
      - dokploy-network
    restart: unless-stopped

volumes:
  saml_idp_data:
  saml_idp_certs:

networks:
  dokploy-network:
    external: true
